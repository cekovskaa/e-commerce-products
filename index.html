<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="./styles/index.css" />

    <title>Frontend Mentor | E-commerce product page</title>
  </head>
  <body>
    <header class="header">
      <nav class="navbar navbar-expand-lg py-0">
        <div class="container g-0 px-3 px-lg-4">
          <!-- Mobile header -->
          <div
            class="header-mobile d-flex d-lg-none align-items-center justify-content-between w-100"
          >
            <div class="d-flex align-items-center gap-3">
              <button
                class="btn mobile-menu-toggle p-0 border-0 bg-transparent d-flex align-items-center justify-content-center"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu"
                aria-controls="mobileMenu"
                aria-label="Open navigation menu"
              >
                <span class="navbar-toggler-icon mobile-menu-icon"></span>
              </button>
              <a class="navbar-brand header-mobile-brand m-0" href="#">
                <img src="./images/logo.svg" alt="Sneakers" />
              </a>
            </div>
            <div class="d-flex align-items-center cart-container">
              <img
                src="./images/icon-cart.svg"
                alt="Cart"
                class="icon-cart"
              />
              <img
                src="./images/image-avatar.png"
                alt="Avatar"
                class="avatar"
              />
            </div>
          </div>

          <!-- Desktop header-->
          <a
            class="navbar-brand m-0 d-none d-lg-inline-flex header-desktop-brand me-0 me-md-4"
            href="#"
          >
            <img src="./images/logo.svg" alt="Sneakers" />
          </a>
          <div
            class="d-none d-lg-flex flex-grow-1 align-items-lg-center header-desktop-nav"
          >
            <div
              class="d-flex flex-row align-items-lg-center justify-content-lg-between flex-grow-1 w-100 gap-4"
            >
              <ul class="navbar-nav mb-0 ms-lg-4">
                <li class="nav-item">
                  <a class="nav-link" href="#">Collections</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Men</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Women</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Contact</a>
                </li>
              </ul>
              <div class="d-flex align-items-center cart-container">
                <img
                  src="./images/icon-cart.svg"
                  alt="Cart"
                  class="icon-cart"
                />
                <img
                  src="./images/image-avatar.png"
                  alt="Avatar"
                  class="avatar"
                />
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- Mobile side menu -->
    <div
      class="offcanvas offcanvas-start mobile-offcanvas"
      tabindex="-1"
      id="mobileMenu"
    >
      <div
        class="offcanvas-header justify-content-start border-0 mobile-offcanvas-top"
      >
        <button
          type="button"
          class="btn-close m-0 mobile-offcanvas-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close navigation menu"
        ></button>
      </div>
      <div class="offcanvas-body mobile-offcanvas-body">
        <nav aria-label="Mobile">
          <ul class="nav flex-column mobile-offcanvas-nav list-unstyled mb-0">
            <li class="nav-item">
              <a class="nav-link mobile-offcanvas-link" href="#">Collections</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mobile-offcanvas-link" href="#">Men</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mobile-offcanvas-link" href="#">Women</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mobile-offcanvas-link" href="#">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link mobile-offcanvas-link" href="#">Contact</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
